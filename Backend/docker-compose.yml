version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: chat-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - chat-network

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: chat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    networks:
      - chat-network

  # Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: chat-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - chat-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: chat-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - chat-network

  # Auth Service
  auth-service:
    build: ./auth-service
    container_name: chat-auth-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/chat-auth?authSource=admin
      - REDIS_URL=redis://redis123@redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-here
      - GOOGLE_CLIENT_ID=your-google-client-id
      - GOOGLE_CLIENT_SECRET=your-google-client-secret
    depends_on:
      - mongodb
      - redis
    networks:
      - chat-network

  # User Service
  user-service:
    build: ./user-service
    container_name: chat-user-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/chat-users?authSource=admin
      - REDIS_URL=redis://redis123@redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-here
    depends_on:
      - mongodb
      - redis
    networks:
      - chat-network

  # Chat Service
  chat-service:
    build: ./chat-service
    container_name: chat-chat-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/chat-messages?authSource=admin
      - REDIS_URL=redis://redis123@redis:6379
      - KAFKA_BROKERS=kafka:29092
      - JWT_SECRET=your-super-secret-jwt-key-here
      - ENCRYPTION_KEY=your-32-character-encryption-key
    depends_on:
      - mongodb
      - redis
      - kafka
    networks:
      - chat-network

  # Media Service
  media-service:
    build: ./media-service
    container_name: chat-media-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - CLOUDINARY_API=715391784418838
      - CLOUDINARY_SECRET=zEQuy6n-Q-8Pd4O8zdmHeVquDQg
      - CLOUD_NAME=dxplpbgkd
      - JWT_SECRET=your-super-secret-jwt-key-here
    networks:
      - chat-network

  # API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: chat-api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - CHAT_SERVICE_URL=http://chat-service:3003
      - MEDIA_SERVICE_URL=http://media-service:3004
      - JWT_SECRET=your-super-secret-jwt-key-here
    depends_on:
      - auth-service
      - user-service
      - chat-service
      - media-service
    networks:
      - chat-network

volumes:
  mongodb_data:
  redis_data:

networks:
  chat-network:
    driver: bridge
